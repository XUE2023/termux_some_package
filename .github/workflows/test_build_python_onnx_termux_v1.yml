name: Build ONNX for Termux

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'aarch64'
        type: choice
        options:
          - aarch64
          - arm
          - x86_64
          - i686

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: termux-packages

    env:
      TERMUX_ARCH: ${{ github.event.inputs.arch || 'aarch64' }}

    steps:
      - name: Checkout termux-packages
        uses: actions/checkout@v4
        with:
          repository: termux/termux-packages
          path: termux-packages

      - name: Setup build environment
        run: |
          sudo ./scripts/setup-ubuntu.sh
          ./scripts/setup-package-build.sh

      - name: Build onnx
        run: ./build-package.sh onnx

      - name: Build python-onnx
        run: ./build-package.sh python-onnx

      - name: Upload DEB files
        uses: actions/upload-artifact@v4
        with:
          name: onnx-debs-${{ env.TERMUX_ARCH }}
          path: termux-packages/debs/${{ env.TERMUX_ARCH }}/*onnx*.deb
