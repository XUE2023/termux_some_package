name: Build ONNX for Termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout termux-packages
        uses: actions/checkout@v4
        with:
          repository: termux/termux-packages
          fetch-depth: 1

      - name: Setup build environment
        run: |
          ./scripts/setup-ubuntu.sh
          ./scripts/setup-package-build.sh

      - name: Build onnx
        run: |
          ./build-package.sh onnx

      - name: Build python-onnx
        run: |
          ./build-package.sh python-onnx

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: termux-onnx-debs
          path: ./debs/*.deb
