name: Build Termux ONNX Runtime

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout termux-packages
        uses: actions/checkout@v4
        with:
          repository: termux/termux-packages
          fetch-depth: 1

      - name: Setup build environment
        run: |
          ./scripts/setup-ubuntu.sh
          ./scripts/setup-package-build.sh

      - name: Build onnxruntime
        run: ./build-package.sh onnxruntime

      - name: Build python-onnxruntime
        run: ./build-package.sh python-onnxruntime

      - name: Upload DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: termux-onnx-debs
          path: ./debs/*.deb
